app-id: com.ktechpit.torrhunt
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: torrhunt
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --env=INSTALL_TYPE=flatpak
  - --talk-name=org.freedesktop.FileManager1
  - --filesystem=xdg-run/gvfsd

cleanup:
  - /include
  - /lib/pkgconfig

modules:
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: torrhunt
    buildsystem: simple
    build-commands:
      - unsquashfs -no-progress SkflXvnUfQ4KFuN0nAos1ykmgwZf0Ujl*.snap
      - install -Dm755 squashfs-root/usr/bin/torrhunt ${FLATPAK_DEST}/bin/torrhunt
      - mkdir -p ${FLATPAK_DEST}/share/icons/hicolor/
      - cp -r squashfs-root/usr/share/icons/hicolor/* ${FLATPAK_DEST}/share/icons/hicolor/
      - install -Dm644 squashfs-root/usr/share/applications/torrhunt.desktop ${FLATPAK_DEST}/share/applications/com.ktechpit.torrhunt.desktop
      # cannot modify upstream icon path ATM.
      - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.ktechpit.torrhunt.desktop
      - install -Dm644 squashfs-root/usr/share/metainfo/com.ktechpit.torrhunt.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.ktechpit.torrhunt.metainfo.xml
    sources:
        # =========================
        # x86_64 (amd64) – stable
        # =========================
        - type: file
            # Get stable amd64 snap URL:
            # curl -H 'Snap-Device-Series: 16' https://api.snapcraft.io/v2/snaps/info/torrhunt | jq -r '.["channel-map"][] | select(.channel.architecture=="amd64" and .channel.risk=="stable" and .channel.track=="latest") | .download.url'
            url: https://api.snapcraft.io/api/v1/snaps/download/SkflXvnUfQ4KFuN0nAos1ykmgwZf0Ujl_27.snap

            # Get sha256:
            # curl -Ls https://api.snapcraft.io/api/v1/snaps/download/SkflXvnUfQ4KFuN0nAos1ykmgwZf0Ujl_27.snap | sha256sum
            sha256: 9cb7d22934c175560404ff8a6cbb49c023a172dad2ab6b1f472ed99e879333fe

            only-arches:
            - x86_64

        # =========================
        # arm64 (aarch64) – stable
        # =========================
        - type: file
            # Get stable arm64 snap URL:
            # curl -H 'Snap-Device-Series: 16' https://api.snapcraft.io/v2/snaps/info/torrhunt | jq -r '.["channel-map"][] | select(.channel.architecture=="arm64" and .channel.risk=="stable" and .channel.track=="latest") | .download.url'
            url: https://api.snapcraft.io/api/v1/snaps/download/SkflXvnUfQ4KFuN0nAos1ykmgwZf0Ujl_28.snap

            # Get sha256:
            # curl -Ls https://api.snapcraft.io/api/v1/snaps/download/SkflXvnUfQ4KFuN0nAos1ykmgwZf0Ujl_28.snap | sha256sum
            sha256: 8b49006d5dd6f2f608f9b2f467f3d68e87b2b197d5fc27448ea6162a999db821

            only-arches:
            - aarch64

#END 2024-05-10
